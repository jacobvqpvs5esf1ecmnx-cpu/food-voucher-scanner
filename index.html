<style>
    /* ... 保留原本樣式 ... */
    .update-box { margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; font-size: 20px; }
    .status-select { font-size: 18px; padding: 5px; border-radius: 5px; }
    .btn-update { padding: 5px 15px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
</style>

<script>
    // ... 前面 Firebase 初始化同原本邏輯保留 ...

    // 修改處理結果嘅部分 (大約喺 line 120 附近)
    if (targetData && targetRef) {
        let statusHtml = `
            姓名：<b>${targetData.name}</b> (${targetData.memberNo})<br>
            現時紀錄：<span id="currentLivingStatus">${targetData.livingStatus || '未有資料'}</span>
            <div class="update-box">
                更改狀況：
                <select id="newStatus" class="status-select">
                    <option value="獨居">獨居</option>
                    <option value="雙老">雙老</option>
                    <option value="其他">其他</option>
                </select>
                <button onclick="updateMemberStatus('${targetRef.id}')" class="btn-update">更新資料</button>
            </div>
        `;

        if (targetData.hasClaimed) {
            bg.className = "status-error";
            message.innerText = "❌ 警告：此會員已領取！";
            let timeStr = formatTime(targetData.claimTime);
            memberInfo.innerHTML = statusHtml + `<br><span style="color:red; font-weight:bold;">領取時間：${timeStr}</span>`;
        } else {
            // ✅ 自動紀錄領取
            const now = new Date().toISOString();
            await targetRef.update({ hasClaimed: true, claimTime: now });
            
            bg.className = "status-success";
            message.innerText = "✅ 可派發食物劵";
            memberInfo.innerHTML = statusHtml + `<br><span style="color:green; font-weight:bold;">紀錄成功！請交出食物劵。</span>`;
        }
        memberInfo.style.display = "inline-block";
    }

    // 🔥 新增：更新居住狀況嘅 Function
    window.updateMemberStatus = async function(docId) {
        const newStatus = document.getElementById('newStatus').value;
        const now = new Date().toISOString();
        try {
            await db.collection('members').doc(docId).update({
                livingStatus: newStatus,
                statusUpdateTime: now // 紀錄更新時間
            });
            document.getElementById('currentLivingStatus').innerText = newStatus;
            alert('資料已更新為：' + newStatus);
        } catch (e) {
            alert('更新失敗：' + e);
        }
    }

    function formatTime(isoStr) {
        if (!isoStr) return '未知';
        const d = new Date(isoStr);
        return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    }
</script>
