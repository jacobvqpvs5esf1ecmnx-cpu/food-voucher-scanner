<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>食物劵派發系統 (完善版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; text-align: center; padding: 30px; margin: 0; min-height: 100vh; background-color: #f0f2f5; transition: background-color 0.3s;}
        h1 { color: #333; margin-bottom: 20px;}
        
        /* 畫面切換控制 */
        .screen { display: none; }
        .screen.active { display: block; }
        
        /* 主選單樣式 */
        .menu-btn { font-size: 40px; padding: 40px; margin: 20px; width: 40%; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.2s;}
        .menu-btn:hover { transform: scale(1.05); }
        .btn-member { background-color: #2196F3; color: white; }
        .btn-nonmember { background-color: #FF9800; color: white; }
        
        /* 返回按鈕 */
        .back-btn { position: absolute; top: 20px; left: 20px; font-size: 20px; padding: 10px 20px; background: #607D8B; color: white; border: none; border-radius: 10px; cursor: pointer;}
        
        /* 計數機 */
        #counterBox { display: inline-block; background-color: #333; color: white; font-size: 24px; font-weight: bold; padding: 10px 30px; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        #claimedCount { color: #4CAF50; font-size: 30px; }
        
        /* 會員區輸入框 */
        .main-input { font-size: 30px; padding: 15px; width: 100%; text-align: center; border: 3px solid #ccc; border-radius: 10px; outline: none; text-transform: uppercase;}
        .main-input:focus { border-color: #2196F3; box-shadow: 0 0 10px rgba(33, 150, 243, 0.3); }
        
        /* 顯示卡片 */
        .result-card { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .status-msg { font-size: 40px; font-weight: bold; margin-bottom: 15px; }
        .member-name { font-size: 50px; font-weight: bold; margin-bottom: 10px; color: #000; }
        .member-no { font-size: 25px; color: #666; margin-bottom: 20px; }
        
        /* 更新居住狀況區塊 */
        .update-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; font-size: 20px; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; color: #333;}
        .status-select { font-size: 18px; padding: 5px; border-radius: 5px;}
        .btn-update { padding: 8px 15px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-left: 10px;}
        
        /* 按鈕群組 */
        .btn-group { margin-top: 30px; }
        .btn { font-size: 30px; padding: 15px 40px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-confirm { background-color: #4CAF50; color: white; width: 100%; margin-bottom: 15px;}
        .btn-confirm:hover { background-color: #45a049; }
        .btn-cancel { background-color: #9e9e9e; color: white; font-size: 20px; width: 100%;}

        /* 非會員表單 */
        .nm-form { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .nm-form label { display: block; font-size: 24px; font-weight: bold; text-align: left; margin-top: 20px; color: #333;}
        .nm-input { font-size: 30px; padding: 15px; width: 90%; border: 2px solid #ccc; border-radius: 10px; margin-top: 10px; outline: none;}
        .nm-input:focus { border-color: #FF9800; }

        .text-red { color: #f44336; }
        .text-green { color: #4CAF50; }
        .text-orange { color: #ff9800; }
    </style>
</head>
<body>

    <div id="counterBox">
        今日已派發總數： <span id="claimedCount">--</span> 份
    </div><br>

    <div id="screen-home" class="screen active">
        <h1 style="font-size: 50px;">請選擇領取者類別</h1>
        <button class="menu-btn btn-member" onclick="switchScreen('screen-member')">👤 中心會員</button>
        <button class="menu-btn btn-nonmember" onclick="switchScreen('screen-nonmember')">🚶 非會員</button>
    </div>

    <div id="screen-member" class="screen">
        <button class="back-btn" onclick="switchScreen('screen-home')">🔙 返回主頁</button>
        <h1>🎁 會員食物劵派發</h1>
        
        <p style="font-size: 18px; color: #666;">請使用 Scanner 掃描條碼，或手動輸入會員編號</p>
        
        <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 20px; max-width: 600px; margin-left: auto; margin-right: auto;">
            <input type="text" id="barcodeInput" class="main-input" placeholder="請掃描或輸入..." autocomplete="off" oninput="this.value = this.value.toUpperCase()">
            <button id="searchMemberBtn" class="btn btn-update" style="font-size: 24px; padding: 15px 30px; margin-left: 10px; background-color: #607D8B; border-radius: 10px;">搜尋</button>
        </div>
        
        <div id="resultCard" class="result-card">
            <div id="statusMsg" class="status-msg"></div>
            <div class="member-name" id="dispName"></div>
            <div class="member-no" id="dispNo"></div>
            
            <div class="update-box">
                現時居住狀況：<b id="currentLivingStatus" style="color:#E91E63;">未有資料</b><br><br>
                更改狀況：
                <select id="newStatus" class="status-select">
                    <option value="獨居">獨居</option>
                    <option value="雙老">雙老</option>
                    <option value="全老戶">全老戶</option>
                    <option value="與家人同住">與家人同住</option>
                    <option value="其他">其他</option>
                </select>
                <button onclick="updateMemberStatus()" class="btn-update">更新紀錄</button>
            </div>
            
            <div class="btn-group">
                <button id="confirmBtn" class="btn btn-confirm">確認派發食物劵</button>
                <button id="cancelBtn" class="btn btn-cancel">取消 / 掃描下一位</button>
            </div>
        </div>
    </div>

    <div id="screen-nonmember" class="screen">
        <button class="back-btn" onclick="switchScreen('screen-home')">🔙 返回主頁</button>
        <h1>🚶 非會員登記</h1>
        
        <div class="nm-form">
            <label>姓名：</label>
            <input type="text" id="nmName" class="nm-input" placeholder="輸入姓名...">
            
            <label>身份證號碼 (用作防重覆核對)：</label>
            <input type="text" id="nmHkid" class="nm-input" placeholder="例：A1234567" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()">
            
            <label>電話號碼 (可重覆)：</label>
            <input type="tel" id="nmPhone" class="nm-input" placeholder="輸入8位數字電話..." maxlength="8">

            <label>居住狀況 (確認資格)：</label>
            <select id="nmLivingStatus" class="nm-input" style="height: 65px; background: white;">
                <option value="獨居">獨居</option>
                <option value="雙老">雙老</option>
                <option value="全老戶">全老戶</option>
                <option value="與家人同住">與家人同住</option>
                <option value="其他">其他</option>
            </select>
            
            <div class="btn-group">
                <button id="nmConfirmBtn" class="btn btn-confirm" style="background-color: #FF9800; margin-top: 15px;">確認派發食物劵</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBkYaOS6YFapXxt4UTwTy3bkK-C_f50hWw",
            authDomain: "food-voucher-2026.firebaseapp.com",
            projectId: "food-voucher-2026",
            storageBucket: "food-voucher-2026.firebasestorage.app",
            messagingSenderId: "531283361505",
            appId: "1:531283361505:web:bc21a158f0b8a6975441a0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 畫面切換邏輯
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.body.style.backgroundColor = "#f0f2f5";
            
            if (screenId === 'screen-member') {
                document.getElementById('barcodeInput').value = '';
                document.getElementById('resultCard').style.display = 'none';
                setTimeout(() => document.getElementById('barcodeInput').focus(), 100);
            } else if (screenId === 'screen-nonmember') {
                document.getElementById('nmName').value = '';
                document.getElementById('nmHkid').value = '';
                document.getElementById('nmPhone').value = '';
                document.getElementById('nmLivingStatus').selectedIndex = 0; // 重置選項
                setTimeout(() => document.getElementById('nmName').focus(), 100);
            }
        }

        // 實時監聽已領取數量
        function updateCounter() {
            db.collection('members').where('hasClaimed', '==', true).onSnapshot(snap1 => {
                let memberCount = snap1.size;
                db.collection('non_members').onSnapshot(snap2 => {
                    let nonMemberCount = snap2.size;
                    document.getElementById('claimedCount').innerText = memberCount + nonMemberCount;
                });
            });
        }
        updateCounter();

        // ==================== 會員區邏輯 ====================
        const input = document.getElementById('barcodeInput');
        const searchMemberBtn = document.getElementById('searchMemberBtn');
        const resultCard = document.getElementById('resultCard');
        const statusMsg = document.getElementById('statusMsg');
        const dispName = document.getElementById('dispName');
        const dispNo = document.getElementById('dispNo');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const currentLivingStatus = document.getElementById('currentLivingStatus');
        let currentTargetRef = null;

        // 點擊空白處自動對焦 (只喺會員畫面生效，避開按鈕)
        document.addEventListener('click', (e) => { 
            if(document.getElementById('screen-member').classList.contains('active') && 
               e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SELECT') {
                input.focus(); 
            }
        });

        // 將搜尋邏輯獨立成一個 Function，方便 Enter 同 Click 共用
        async function performSearch() {
            const inputValue = input.value.trim().toUpperCase(); // 保險起見再大階一次
            input.value = "";
            if (!inputValue) return;

            resultCard.style.display = "none";
            document.body.style.backgroundColor = "#f0f2f5";
            currentTargetRef = null;

            try {
                let targetData = null;

                const docSnap = await db.collection('members').doc(inputValue).get();
                if (docSnap.exists) {
                    currentTargetRef = db.collection('members').doc(inputValue);
                    targetData = docSnap.data();
                } else {
                    const querySnap = await db.collection('members').where('memberNo', '==', inputValue).get();
                    if (!querySnap.empty) {
                        currentTargetRef = querySnap.docs[0].ref;
                        targetData = querySnap.docs[0].data();
                    }
                }

                if (targetData && currentTargetRef) {
                    resultCard.style.display = "block";
                    dispName.innerText = targetData.name;
                    dispNo.innerText = "會員編號: " + targetData.memberNo;
                    currentLivingStatus.innerText = targetData.livingStatus || "未有資料";

                    if (targetData.hasClaimed) {
                        document.body.style.backgroundColor = "#ffcdd2";
                        let timeStr = formatTime(targetData.claimTime);
                        statusMsg.innerHTML = `⚠️ 此會員已領取！<br><span style="font-size:20px; color:#333;">領取時間：${timeStr}</span>`;
                        statusMsg.className = "text-red";
                        confirmBtn.style.display = "none"; 
                    } else {
                        document.body.style.backgroundColor = "#c8e6c9";
                        statusMsg.innerText = "✅ 資格確認：未領取";
                        statusMsg.className = "text-green";
                        confirmBtn.style.display = "block"; 
                        confirmBtn.disabled = false;
                        confirmBtn.innerText = "確認派發食物劵";
                        confirmBtn.focus(); 
                    }
                } else {
                    document.body.style.backgroundColor = "#ffe0b2";
                    resultCard.style.display = "block";
                    dispName.innerText = "查無此人";
                    dispNo.innerText = inputValue;
                    currentLivingStatus.innerText = "--";
                    statusMsg.innerText = "⚠️ 找不到此條碼或編號";
                    statusMsg.className = "text-orange";
                    confirmBtn.style.display = "none";
                }
            } catch (error) {
                alert("查詢錯誤：" + error);
            }
        }

        // 綁定 Enter 鍵
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // 綁定「搜尋」按鈕
        searchMemberBtn.addEventListener('click', performSearch);

        // 綁定確認派發按鈕
        confirmBtn.onclick = async () => {
            if (!currentTargetRef) return;
            confirmBtn.disabled = true;
            confirmBtn.innerText = "紀錄中...";
            try {
                await currentTargetRef.update({
                    hasClaimed: true,
                    claimTime: new Date().toISOString()
                });
                document.body.style.backgroundColor = "#4CAF50"; 
                statusMsg.innerText = "✅ 成功紀錄！請交出食物劵。";
                statusMsg.className = "text-green";
                confirmBtn.style.display = "none";
                setTimeout(() => input.focus(), 100); 
            } catch (e) {
                alert("錯誤：" + e);
                confirmBtn.disabled = false;
            }
        };

        cancelBtn.onclick = () => {
            resultCard.style.display = "none";
            document.body.style.backgroundColor = "#f0f2f5";
            input.focus();
        };

        window.updateMemberStatus = async function() {
            if (!currentTargetRef) return;
            const newStatus = document.getElementById('newStatus').value;
            const now = new Date().toISOString();
            try {
                await currentTargetRef.update({
                    livingStatus: newStatus,
                    statusUpdateTime: now
                });
                currentLivingStatus.innerText = newStatus;
                alert('資料已成功更新為：' + newStatus);
            } catch (e) {
                alert('更新失敗：' + e);
            }
        };

        // ==================== 非會員區邏輯 ====================
        document.getElementById('nmConfirmBtn').onclick = async () => {
            const name = document.getElementById('nmName').value.trim();
            const hkid = document.getElementById('nmHkid').value.trim().toUpperCase(); 
            const phone = document.getElementById('nmPhone').value.trim();
            const livingStatus = document.getElementById('nmLivingStatus').value; // 獲取居住狀況

            if (!name || !hkid || !phone) {
                alert("⚠️ 請填寫完整姓名、身份證號碼及電話號碼！");
                return;
            }

            if (phone.length < 8) {
                alert("⚠️ 電話號碼格式似乎不正確！");
                return;
            }

            const btn = document.getElementById('nmConfirmBtn');
            btn.disabled = true;
            btn.innerText = "紀錄中...";

            try {
                const nmRef = db.collection('non_members').doc(hkid);
                const nmDoc = await nmRef.get();

                if (nmDoc.exists) {
                    document.body.style.backgroundColor = "#ffcdd2";
                    alert(`❌ 警告：此身份證號碼 (${hkid}) 已經領取過食物劵！`);
                    btn.disabled = false;
                    btn.innerText = "確認派發食物劵";
                    return;
                }

                // 將居住狀況 (livingStatus) 寫入非會員紀錄
                await nmRef.set({
                    name: name,
                    hkid: hkid,
                    phone: phone,
                    livingStatus: livingStatus,
                    isMember: false,
                    hasClaimed: true,
                    claimTime: new Date().toISOString()
                });

                document.body.style.backgroundColor = "#4CAF50";
                alert("✅ 非會員紀錄成功！請交出食物劵。");
                
                setTimeout(() => {
                    switchScreen('screen-home');
                    btn.disabled = false;
                    btn.innerText = "確認派發食物劵";
                }, 1500);

            } catch (e) {
                alert("錯誤：" + e);
                btn.disabled = false;
                btn.innerText = "確認派發食物劵";
            }
        };

        function formatTime(isoStr) {
            if (!isoStr) return '未知時間';
            const d = new Date(isoStr);
            return `${d.getMonth()+1}月${d.getDate()}日 ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
