<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>會員資料匯入工具 (完整資料版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body style="font-family: sans-serif; padding: 30px;">
    <h2>匯入會員資料 (包含性別、年齡、電話)</h2>
    <p>請確保 CSV 標題包含：<b>BarCodeNo, MemberNo, MemberChineseName, Gender, Age, Phone</b></p>
    <input type="file" id="csvFile" accept=".csv"><br><br>
    <button id="importBtn" style="padding:10px; background:#4CAF50; color:white;">開始匯入 Firebase</button>
    <div id="status" style="margin-top:20px; font-weight:bold;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkYaOS6YFapXxt4UTwTy3bkK-C_f50hWw",
            authDomain: "food-voucher-2026.firebaseapp.com",
            projectId: "food-voucher-2026",
            storageBucket: "food-voucher-2026.firebasestorage.app",
            messagingSenderId: "531283361505",
            appId: "1:531283361505:web:bc21a158f0b8a6975441a0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('importBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('csvFile');
            const status = document.getElementById('status');
            if (!fileInput.files.length) return alert('請先選擇 CSV 檔案');

            const reader = new FileReader();
            reader.onload = async function(e) {
                const lines = e.target.result.split('\n');
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                
                const barIdx = headers.indexOf('BarCodeNo');
                const noIdx = headers.indexOf('MemberNo');
                const nameIdx = headers.indexOf('MemberChineseName');
                const genderIdx = headers.indexOf('Gender');
                const ageIdx = headers.indexOf('Age');
                const phoneIdx = headers.indexOf('Phone');

                if (barIdx === -1 || noIdx === -1 || nameIdx === -1) {
                    return alert('CSV 標題缺少必要欄位！');
                }

                document.getElementById('importBtn').disabled = true;
                let count = 0;

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const data = lines[i].split(',').map(d => d.trim().replace(/^"|"$/g, ''));
                    
                    try {
                        await db.collection('members').doc(data[barIdx]).set({
                            memberNo: data[noIdx],
                            name: data[nameIdx],
                            gender: genderIdx !== -1 ? data[genderIdx] : '',
                            age: ageIdx !== -1 ? data[ageIdx] : '',
                            phone: phoneIdx !== -1 ? data[phoneIdx] : '',
                            hasClaimed: false,
                            claimTime: null,
                            voucherNo: null
                        });
                        count++;
                        status.innerText = `正在匯入：${count} 人...`;
                    } catch (err) { console.error(err); }
                }
                status.innerHTML = `<span style="color:green">完成！已成功匯入 ${count} 人。</span>`;
            };
            reader.readAsText(fileInput.files[0]);
        });
    </script>
</body>
</html>
